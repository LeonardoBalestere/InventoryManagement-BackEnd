name: CI - Build & Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build, xUnit & Codecov
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore ./InventoryManagement.slnx

    - name: Build
      run: dotnet build ./InventoryManagement.slnx --no-restore --configuration Release

    - name: Run xUnit and Collect Coverage
      run: dotnet test ./InventoryManagement.slnx --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage"

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: '**/coverage.cobertura.xml'
        fail_ci_if_error: true